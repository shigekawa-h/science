<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>理科スライド</title>
<style>
/* ============================================================
   理科授業スライド テンプレート
   設計基準: 1280×720 の固定ステージを画面に合わせて拡縮
   文字サイズ: 本文 54px(≒PPT40pt) / 最小 48px(≒36pt)
   ============================================================ */
:root{
  --ink:#1F2E38;        /* 本文の濃紺グレー */
  --bg:#FBFDFF;         /* スライド地 */
  --frame:#0E5FA0;      /* メイン(フラスコブルー) */
  --frame-soft:#E3EEF7; /* メインの淡色 */
  --line:#B9C8D3;
  --marker:#FFE066;     /* 蛍光マーカー黄 */
  --danger:#D6402B;     /* 安全注意の赤 */
  --danger-soft:#FDF0ED;
  --fs-title:88px;
  --fs-h1:66px;
  --fs-body:54px;   /* ≒40pt */
  --fs-min:48px;    /* ≒36pt これ未満は使わない */
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  background:#10181E;
  font-family:"BIZ UDPGothic","BIZ UDGothic","Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
  color:var(--ink);
  overflow:hidden;
}

/* ---- 拡縮ステージ ---- */
#stage{
  position:absolute; top:50%; left:50%;
  width:1280px; height:720px;
  transform-origin:center center;
}

/* ---- スライド共通 ---- */
.slide{
  position:absolute; inset:0;
  width:1280px; height:720px;
  background:var(--bg);
  padding:36px 56px 44px;
  display:none;
  flex-direction:column;
}
.slide.current{display:flex;}

/* 上部バー: 場面ラベル + 見出し */
.top{
  display:flex; align-items:center; gap:28px;
  border-bottom:6px solid var(--frame);
  padding-bottom:18px; margin-bottom:30px;
  flex:0 0 auto;
}
.chip{
  flex:0 0 auto;
  background:var(--frame); color:#fff;
  font-size:var(--fs-min); font-weight:700;
  padding:6px 30px; border-radius:14px;
  letter-spacing:.08em;
}
.top h1{
  font-size:var(--fs-h1); font-weight:800; line-height:1.25;
}

/* 本文エリア */
.body{
  flex:1 1 auto; min-height:0;
  display:flex; flex-direction:column; justify-content:center;
  font-size:var(--fs-body); line-height:1.55;
}

/* 箇条書き */
ul.li{list-style:none;}
ul.li li{
  padding-left:1.2em; position:relative; margin:.45em 0;
}
ul.li li::before{
  content:""; position:absolute; left:0; top:.52em;
  width:.55em; height:.55em; background:var(--frame); border-radius:3px;
}

/* マーカー強調(教室の後ろからも目立つ) */
.mk{
  font-weight:800;
  background:linear-gradient(transparent 58%, var(--marker) 58%);
  padding:0 .08em;
}

/* ============ レイアウト: タイトル ============ */
.slide[data-layout="title"]{justify-content:center; text-align:center;}
.unit{
  font-size:var(--fs-min); font-weight:700; color:var(--frame);
  letter-spacing:.15em; margin-bottom:36px;
}
.unit::before,.unit::after{content:"—"; margin:0 .6em; color:var(--line);}
.slide[data-layout="title"] .maintitle{
  font-size:var(--fs-title); font-weight:800; line-height:1.3;
  margin-bottom:48px;
}
.slide[data-layout="title"] .sub{font-size:var(--fs-min); color:#55707F;}

/* ============ レイアウト: 本時の課題 ============ */
.kadai{
  position:relative;
  border:8px solid var(--frame);
  border-radius:22px;
  background:#fff;
  padding:64px 56px 56px;
  font-size:64px; font-weight:800; line-height:1.5;
  text-align:center;
}
.kadai .stamp{
  position:absolute; top:-38px; left:44px;
  background:var(--frame); color:#fff;
  font-size:var(--fs-min); font-weight:800;
  padding:8px 36px; border-radius:14px; letter-spacing:.25em;
}

/* ============ 画像 ============ */
figure.img{
  display:flex; flex-direction:column; align-items:center;
  gap:14px; min-height:0; flex:1 1 auto;
}
figure.img img{
  max-width:100%; max-height:100%; min-height:0;
  object-fit:contain; border-radius:10px;
}
figure.img figcaption{
  flex:0 0 auto;
  font-size:var(--fs-min); color:#40586A; font-weight:700;
}
/* 端末内の画像をその場で選ぶスロット(HTMLに画像を含めない) */
.img-slot{
  flex:1 1 auto; min-height:0; width:100%;
  border:6px dashed var(--line); border-radius:14px;
  background:var(--frame-soft);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; overflow:hidden;
  font-size:var(--fs-min); color:#5A7489; font-weight:700;
}
.img-slot img{width:100%; height:100%; object-fit:contain;}

/* ============ レイアウト: 2カラム ============ */
.cols{
  display:grid; grid-template-columns:1fr 1fr; gap:48px;
  flex:1 1 auto; min-height:0; align-items:stretch;
}
.cols > *{min-height:0;}

/* ============ レイアウト: 実験手順 ============ */
ol.steps{list-style:none; counter-reset:st; display:flex; flex-direction:column; gap:22px;}
ol.steps li{
  counter-increment:st;
  display:flex; align-items:center; gap:26px;
  background:#fff; border:3px solid var(--line); border-radius:16px;
  padding:14px 26px; line-height:1.4;
}
ol.steps li::before{
  content:counter(st);
  flex:0 0 auto; width:76px; height:76px;
  background:var(--frame); color:#fff; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:var(--fs-min); font-weight:800;
}
.warn{
  margin-top:26px;
  display:flex; align-items:center; gap:22px;
  border:5px solid var(--danger); background:var(--danger-soft);
  border-radius:16px; padding:14px 26px;
  font-weight:800; color:var(--danger); line-height:1.4;
}
.warn::before{content:"⚠"; font-size:64px; line-height:1;}

/* ============ レイアウト: 思考の流れ ============ */
.flow{display:flex; align-items:stretch; gap:0; flex:1 1 auto; min-height:0;}
.flow .box{
  flex:1 1 0; min-width:0;
  border:5px solid var(--frame); border-radius:18px; background:#fff;
  display:flex; flex-direction:column;
  overflow:hidden;
}
.flow .box b{
  background:var(--frame); color:#fff; text-align:center;
  font-size:var(--fs-min); padding:8px 0; letter-spacing:.1em;
}
.flow .box div{
  flex:1; display:flex; align-items:center; justify-content:center;
  padding:20px 24px; text-align:center; line-height:1.45;
}
.flow .arw{
  flex:0 0 auto; align-self:center;
  width:0; height:0; margin:0 10px;
  border-top:34px solid transparent;
  border-bottom:34px solid transparent;
  border-left:44px solid var(--frame);
}
/* 縦の流れ(flow-v) */
.flow-v{display:flex; flex-direction:column; gap:0; flex:1 1 auto; min-height:0;}
.flow-v .box{border:5px solid var(--frame); border-radius:18px; background:#fff;
  padding:16px 30px; text-align:center; line-height:1.45;}
.flow-v .arw{
  align-self:center; width:0; height:0; margin:6px 0;
  border-left:34px solid transparent; border-right:34px solid transparent;
  border-top:40px solid var(--frame);
}

/* ============ レイアウト: 比較 ============ */
.compare{display:grid; grid-template-columns:1fr 1fr; gap:44px; flex:1 1 auto; min-height:0;}
.compare .pane{
  border:5px solid var(--frame); border-radius:18px; background:#fff;
  display:flex; flex-direction:column; overflow:hidden; min-height:0;
}
.compare .pane > b{
  background:var(--frame); color:#fff; text-align:center;
  font-size:var(--fs-min); padding:10px 0; flex:0 0 auto;
}
.compare .pane > div{flex:1; min-height:0; padding:24px 30px; display:flex; flex-direction:column;}

/* ============ レイアウト: まとめ ============ */
.matome{
  border:8px double var(--frame);
  border-radius:22px; background:#fff;
  padding:56px 60px; font-size:60px; font-weight:700; line-height:1.7;
}

/* ---- 操作HUD ---- */
#hud{
  position:fixed; right:20px; bottom:16px; z-index:10;
  display:flex; align-items:center; gap:14px;
  font-size:20px; color:#C6D5E0; user-select:none;
}
#hud button{
  font-size:22px; padding:6px 18px; border-radius:10px;
  border:1px solid #4A5A66; background:#1C2830; color:#C6D5E0; cursor:pointer;
}
#hud button:hover{background:#2A3944;}
</style>
</head>
<body>
<div id="stage">
